<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>软件发布页</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(60,60,120,0.15);
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #5f4b8b;
            margin-bottom: 16px;
            font-size: 2.2em;
            letter-spacing: 2px;
        }
        p {
            color: #666;
            margin-bottom: 28px;
            font-size: 1.1em;
        }
        .btn {
            background: linear-gradient(90deg, #5f4b8b 0%, #42e695 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 32px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: linear-gradient(90deg, #42e695 0%, #5f4b8b 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到FurtherLi软件发布页</h1>
        <p>下载SubaruCommunity</p>
        <a href="SubaruCommunity.exe" class="btn" download>点击下载</a>
        -v1.0.0
        <p style="font-size:0.95em;color:#999;margin-top:16px;">最新版本：v1.0.0<br>文件大小：12MB</p>
    </div>
</body>
</html>
<script>
document.querySelector('.container').addEventListener('mousemove', function(e) {
    const rect = this.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;
    this.style.transform = `rotateY(${x / 20}deg) rotateX(${-y / 20}deg) scale(1.03)`;
    this.style.boxShadow = `${x/10}px ${y/10+8}px 40px rgba(60,60,120,0.18)`;
});
document.querySelector('.container').addEventListener('mouseleave', function() {
    this.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
    this.style.boxShadow = '0 8px 32px rgba(60,60,120,0.15)';
});
</script>
